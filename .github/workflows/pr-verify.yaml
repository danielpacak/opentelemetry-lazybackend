name: Verify PR

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5  # v5.5.0
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build binary
        run: go build -o opentelemetry-lazybackend .

  integration:
    needs: verify
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5  # v5.5.0
        with:
          go-version-file: go.mod

      - name: Build binary
        run: go build -o opentelemetry-lazybackend .

      - name: Start lazybackend
        run: |
          nohup ./opentelemetry-lazybackend > /tmp/lazybackend.log 2>&1 &
          echo $! > /tmp/lazybackend.pid

      - name: Wait for lazybackend to be ready
        run: |
          timeout 15 bash -c 'until nc -z 127.0.0.1 4317 && nc -z 127.0.0.1 4318; do sleep 0.5; done'

      - name: Verify lazybackend is still running
        run: |
          kill -0 $(cat /tmp/lazybackend.pid) || (echo "lazybackend crashed:"; cat /tmp/lazybackend.log; exit 1)

      - name: Run integration tests
        run: go test -tags integration ./...

      - name: Print lazybackend logs on failure
        if: failure()
        run: cat /tmp/lazybackend.log
